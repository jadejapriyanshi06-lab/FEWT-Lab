<!--Generate a Random Password (digits only) of user-defined length using the Math 
object. (B)-->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        let n = parseInt(prompt("enter password length"));
        let password = "";
        for(i=0;i<n;i++){
            password = Math.floor(Math.random()*10);
            document.write(password);
        }
        
    </script>
</body>
</html>
