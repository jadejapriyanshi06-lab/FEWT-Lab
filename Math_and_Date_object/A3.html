<!--Display Floor, Ceiling, Round, and Truncate values of a decimal number. (A)-->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        let n = parseFloat(prompt("enter number :"));
        document.write("Floor :"+Math.floor(n)+"<br/>");
        document.write("Ceil :"+Math.ceil(n)+"<br/>");
        document.write("Round :"+Math.round(n)+"<br/>");
        document.write("truncate :"+Math.trunc(n));
    </script>
</body>
</html>
