<!--Display the Current Date, Time, Day, Month, and Year using the Date object. (A)-->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        let today = new Date();
        document.write("Date "+today+"<br/>");
        document.write("Time "+today.getTime()+"<br/>");
        document.write("Day "+(today.getDay()+1)+"<br/>");
        document.write("Month "+(today.getMonth()+1)+"<br/>");
        document.write("Year "+today.getFullYear()+"<br/>");
    </script>
</body>
</html>
