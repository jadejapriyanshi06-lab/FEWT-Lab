<!--Find Maximum, Minimum, and Absolute Value using the Math object. (A)-->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        num1 = parseInt(prompt("enter num1 :"));
        num2 = parseInt(prompt("enter num2 :"));
        num3 = parseFloat(prompt("enter num3 :"));
        document.write("maximum num : "+Math.max(num1,num2)+"<br/>");
        document.write("Minimum num : "+Math.min(num1,num2)+"<br/>");
        document.write("absolute num : "+Math.abs(num3));
    </script>
</body>
</html>
