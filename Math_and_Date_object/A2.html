<!--Generate a Random Dice Number (1–6) using Math.random(). (A)-->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
     <script>
        n = Math.floor(Math.random()*6)+1;
        document.write("Random dice number : "+(Math.ceil(n)));
    </script>
</body>
</html>
