<!--changing background color of div from red to yellow. -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .div{
            height: 500px;
            width: 500px;
            background-color: red;
        }
        div:hover{
            background-color: yellow;
        }

    </style>
</head>
<body>
    <div class="div">hello</div>
</body>
</html>
