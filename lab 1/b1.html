<!-- Link after visited red color before visited orange color -->
 <!DOCTYPE html>
 <html lang="en">
 <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        a{
            color:red;
        }
        a:visited{
            color: orange;
        }
    </style>
 </head>
 <body>
    <div class="head">
        <a href="https://www.google.com/">Google</a>
        </div>
    
 </body>
 </html>
