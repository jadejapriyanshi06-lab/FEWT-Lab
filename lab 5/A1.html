<!--1. Demonstrate the use of array to ƒind maximum number. (A)-->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
      let a=[1,7,3,10,32];
    let i,j,max=a[0];
    for(i=0;i<a.length;i++){
            if(max<a[i]){
                max=a[i];
            }
        }
    document.write(max);
    </script>
</body>
</html>
