<!--5. Write a JavaScript that uses a loop that searches a word in 
sentence held in an array, returning the index of the word. (B)-->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        let arr = ['Apple','ball','hourse','dharmi','orange'];
        let a = prompt("enter str :");
        let index=-1;

        for(i=0;i<arr.length;i++){
            if(arr[i]===a){
                index=i;
                break;
            }
        }
        if(index==-1){
            document.write("not in arr");
        }
        else{
             document.write(index);
        }
    </script>
    
</body>
</html>
